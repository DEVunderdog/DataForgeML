name: Deploy Docs

# Deploys docs only after a real PyPI release, not on every merge to main.
# Coupled by name to the "Publish to PyPI" workflow (publish.yml) -- if that
# workflow is renamed, update the `workflows:` list below to match.
on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types:
      - completed

jobs:
  deploy:
    name: Build and deploy Sphinx docs
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      # Python version matches the upper bound tested in CI (pyproject.toml requires >3.10)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build docs
        run: sphinx-build -W -b html docs/ docs/_build/html

      # One-time manual step: after the first successful run, go to
      # repo Settings → Pages → Source and select the gh-pages branch.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
